services:
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - bowtie-net

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      # When running behind nginx, /api/* calls go through nginx → api service.
      # The NEXT_PUBLIC_API_URL is only used by the Next.js rewrite rule in dev;
      # in production the rewrite is handled by nginx, so this var is unused.
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bowtie-net

  nginx:
    image: nginx:alpine@sha256:c1263cc56873d66f381fd07149aa0dc7244dd7c941334cd18473c46509f08465
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped
    networks:
      - bowtie-net

networks:
  bowtie-net:
    driver: bridge
