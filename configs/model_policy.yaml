provider: anthropic
# Start cheap by default (even if ladder isn't used somewhere)
default_model: claude-haiku-4-5-20251001

# Only include models you actually have in your account list
fallback_models:
  - claude-haiku-4-5-20251001
  - claude-sonnet-4-20250514
  - claude-sonnet-4-5-20250929
  - claude-sonnet-4-6

retries_per_model: 2

promote_on:
  - timeout
  - rate_limit
  - empty_output
  - invalid_json
  - schema_validation_failed
