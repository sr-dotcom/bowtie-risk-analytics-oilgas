provider: anthropic
default_model: claude-sonnet-4-6

# Ladder: start cheap/small, then stronger, final best.
fallback_models:
  - claude-haiku-4-5-20251001
  - claude-sonnet-4-6
  - claude-opus-4-5-20251001
  - claude-sonnet-4-6   # final best (repeat ok; replace if you have a "4.6 highest" id)

retries_per_model: 2

promote_on:
  - timeout
  - rate_limit
  - empty_output
  - invalid_json
  - schema_validation_failed
