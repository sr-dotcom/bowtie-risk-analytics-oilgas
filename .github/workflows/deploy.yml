name: Build and push Docker images

on:
  push:
    branches:
      - main
      - milestone/M003-z2jh4m
    paths:
      - 'src/**'
      - 'frontend/**'
      - 'configs/**'
      - 'data/models/artifacts/**'
      - 'data/rag/v2/**'
      - 'scripts/association_mining/**'
      - 'requirements*.txt'
      - 'deploy/Dockerfile.api'
      - 'deploy/Dockerfile.frontend'
      - 'deploy/.dockerignore'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.api
          push: true
          tags: |
            ghcr.io/sr-dotcom/bowtie-risk-analytics-oilgas-api:latest
            ghcr.io/sr-dotcom/bowtie-risk-analytics-oilgas-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.bowtie.gnsr.dev
          tags: |
            ghcr.io/sr-dotcom/bowtie-risk-analytics-oilgas-frontend:latest
            ghcr.io/sr-dotcom/bowtie-risk-analytics-oilgas-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
