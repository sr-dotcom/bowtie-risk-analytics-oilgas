name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: >-
          python3 -m pytest tests/ -q --tb=short -x
          --ignore=tests/test_train.py
          --ignore=tests/test_explain.py
          --ignore=tests/test_predict.py
          --ignore=tests/test_feature_engineering.py
          --ignore=tests/test_profile.py
          --ignore=tests/test_api.py
          --ignore=tests/test_mapping.py

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run vitest
        run: cd frontend && npx vitest run
